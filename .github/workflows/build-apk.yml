name: Build & Release APK

# ============================================================
# LinguaVerse — Android APK build & release pipeline
# ------------------------------------------------------------
# Triggers:
#   • push to main     → nightly pre-release tagged nightly-<sha>
#   • tag v*           → stable release tied to the tag
#   • workflow_dispatch → manual run with custom tag + pre-release toggle
#
# Secrets required (Settings → Secrets and variables → Actions):
#   Translation (baked into the APK at Vite build time):
#     AGNES_API_KEY, AGNES_BASE_URL, AGNES_MODEL
#   Voice / STT (optional — either backend or direct mode):
#     VITE_STT_BACKEND_URL  (preferred — backend holds Whisper key)
#     OR
#     VITE_STT_API_KEY + VITE_STT_BASE_URL (+ optional VITE_STT_MODEL)
#   APK signing:
#     ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#     ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
# ============================================================

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'
      is_prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        required: false
        default: true

permissions:
  contents: write   # required for softprops/action-gh-release to create Releases

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ---------- 1. Checkout ----------
      - name: 📥 Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the GITHUB_TOKEN (auto-provided) so the version-bump commit
          # in step 1b can be pushed back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 1b. Compute version for this build ----------
      # Reads versionName + versionCode from build.gradle. For push-to-main
      # builds, we append the GitHub run number as a build metadata suffix
      # (e.g. 1.0.1+123) so every build has a unique, monotonically-
      # increasing version without writing back to build.gradle (which
      # would cause an infinite build loop).
      #
      # Tag-triggered builds (v1.2.3) use the tag directly as versionName.
      # Manual dispatch uses the user-provided tag or auto-bumps patch.
      - name: 🔢 Compute version
        id: version
        run: |
          set -e
          GRADLE="android/app/build.gradle"

          # Read current versionName + versionCode from build.gradle
          CURRENT_NAME=$(grep -E '^\s*versionName' "$GRADLE" | head -1 | sed -E 's/.*versionName "([^"]+)".*/\1/')
          CURRENT_CODE=$(grep -E '^\s*versionCode' "$GRADLE" | head -1 | sed -E 's/.*versionCode ([0-9]+).*/\1/')
          echo "Current build.gradle: versionName=$CURRENT_NAME versionCode=$CURRENT_CODE"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push (v1.2.3) — use the tag as versionName, bump versionCode
            # by the GitHub run number so Android sees it as a new release.
            NEW_NAME="${GITHUB_REF#refs/tags/v}"
            NEW_CODE=$((CURRENT_CODE + 1))
            IS_PRERELEASE="false"
            echo "Tag build: versionName=$NEW_NAME versionCode=$NEW_CODE"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_INPUT="${{ inputs.tag_name }}"
            if [[ "$TAG_INPUT" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              NEW_NAME="${TAG_INPUT#v}"
              NEW_CODE=$((CURRENT_CODE + 1))
            else
              # Auto-bump patch version
              NEW_NAME=$(echo "$CURRENT_NAME" | awk -F. -v OFS=. '{$3++; print}')
              NEW_CODE=$((CURRENT_CODE + 1))
            fi
            IS_PRERELEASE="${{ inputs.is_prerelease }}"
            echo "Manual build: versionName=$NEW_NAME versionCode=$NEW_CODE"
          else
            # Push to main — use current versionName + GitHub run number
            # as versionCode (monotonically increasing, no write-back needed).
            # Version tag is v<versionName> (e.g. v1.0.1) — if two pushes
            # happen with the same versionName, softprops/action-gh-release
            # will UPDATE the existing release rather than create a new one,
            # so the Releases page always shows the latest build.
            #
            # Marked as NOT pre-release so GitHub's "Latest" pointer tracks
            # the newest build automatically (GitHub never auto-promotes a
            # pre-release to Latest).
            NEW_NAME="$CURRENT_NAME"
            NEW_CODE="${{ github.run_number }}"
            IS_PRERELEASE="false"
            echo "Push build: versionName=$NEW_NAME versionCode=$NEW_CODE (run number)"
          fi

          # Write the new versionCode back to build.gradle for this build
          # (the change is NOT committed back, so no infinite loop).
          sed -i -E "s/(\s*versionCode )[0-9]+/\1$NEW_CODE/" "$GRADLE"
          echo "Updated build.gradle for this build:"
          grep -E '^\s*version(Code|Name)' "$GRADLE"

          # Expose to later steps
          echo "name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_NAME" >> $GITHUB_OUTPUT
          echo "prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      # ---------- 2. Setup JDK (needed before Android SDK) ----------
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- 3. Setup Android SDK ----------
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      # ---------- 4. Node + npm cache ----------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --no-audit --no-fund

      # ---------- 5b. Probe whether Agnes gateway supports Whisper STT ----------
      # Agnes's /chat/completions is verified working, but .env.example says
      # "Agnes does NOT expose a Whisper endpoint". The backend's config.py
      # disagrees and defaults STT to the Agnes gateway. We resolve the
      # ambiguity empirically: send a real (tiny) audio file to
      # /audio/transcriptions with the real AGNES_API_KEY.
      #
      #   • If 200 → Agnes DOES support Whisper. Inject VITE_STT_API_KEY =
      #     AGNES_API_KEY and VITE_STT_BASE_URL = AGNES_BASE_URL so the APK
      #     gets voice input for free (no extra secrets needed).
      #   • If 401/403 → endpoint exists but key rejected (shouldn't happen
      #     since the same key works for chat). Treat as "supports".
      #   • If 404/405 → Agnes does NOT support Whisper. Skip — the APK's
      #     mic button will show "未配置" until separate STT secrets are set.
      #   • If network error → log a warning and skip (don't fail the build).
      #
      # The result is exported as $VITE_STT_API_KEY / $VITE_STT_BASE_URL
      # env vars for the next step.
      - name: 🎙️ Probe Agnes Whisper support
        id: stt_probe
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
        run: |
          set +e  # don't fail the build on probe failure
          # If the user has explicitly set VITE_STT_* secrets, skip the
          # probe — their secrets take priority.
          if [ -n "${{ secrets.VITE_STT_API_KEY }}" ] || [ -n "${{ secrets.VITE_STT_BACKEND_URL }}" ]; then
            echo "User-configured STT secrets detected — skipping Agnes probe."
            echo "use_agnes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$AGNES_API_KEY" ] || [ -z "$AGNES_BASE_URL" ]; then
            echo "AGNES_API_KEY / AGNES_BASE_URL not set — cannot probe."
            echo "use_agnes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Create a tiny valid WAV file (8 bytes of silence)
          python3 -c "
          import struct, io
          buf = io.BytesIO()
          buf.write(b'RIFF'); buf.write(struct.pack('<I', 36 + 8)); buf.write(b'WAVE')
          buf.write(b'fmt '); buf.write(struct.pack('<I', 16)); buf.write(struct.pack('<H', 1))
          buf.write(struct.pack('<H', 1)); buf.write(struct.pack('<I', 8000))
          buf.write(struct.pack('<I', 8000)); buf.write(struct.pack('<H', 1))
          buf.write(struct.pack('<H', 8)); buf.write(b'data'); buf.write(struct.pack('<I', 8))
          buf.write(b'\x80' * 8)
          open('/tmp/probe.wav', 'wb').write(buf.getvalue())
          "

          # Try a list of common Whisper model names. Agnes's gateway
          # accepts /audio/transcriptions but may not have a channel for
          # 'whisper-1' (we saw 503 'model_not_found' for whisper-1 in
          # production). Try alternatives until one works or all fail.
          MODELS_TO_TRY="whisper-1 whisper-large-v3 whisper-large-v2 whisper-turbo openai/whisper-large-v3 openai/whisper-1"
          FOUND_MODEL=""
          FOUND_HTTP=""
          for MODEL in $MODELS_TO_TRY; do
            echo "Probing ${AGNES_BASE_URL}/audio/transcriptions with model=${MODEL} ..."
            HTTP_CODE=$(curl -s -o /tmp/stt_probe_resp.txt -w "%{http_code}" \
              -X POST "${AGNES_BASE_URL}/audio/transcriptions" \
              -H "Authorization: Bearer ${AGNES_API_KEY}" \
              -F "file=@/tmp/probe.wav" \
              -F "model=${MODEL}" \
              -F "language=zh")
            echo "  HTTP $HTTP_CODE"
            echo "  Response: $(head -c 200 /tmp/stt_probe_resp.txt)"
            # 200 = success (model works, even if it returned empty text for our silence)
            # 400/422 = model accepted but file rejected (still means model exists)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "400" ] || [ "$HTTP_CODE" = "422" ]; then
              FOUND_MODEL="$MODEL"
              FOUND_HTTP="$HTTP_CODE"
              break
            fi
            # 503 model_not_found = this model isn't available, try next
            # 401/403 = auth issue (same key works for chat, so shouldn't happen)
            # 404/405 = endpoint doesn't exist at all (no point trying more models)
            if [ "$HTTP_CODE" = "404" ] || [ "$HTTP_CODE" = "405" ]; then
              echo "Endpoint not found — stopping probe."
              break
            fi
          done

          if [ -n "$FOUND_MODEL" ]; then
            echo "✅ Agnes gateway supports Whisper with model '${FOUND_MODEL}' (HTTP $FOUND_HTTP)."
            echo "use_agnes=true" >> $GITHUB_OUTPUT
            echo "stt_api_key=$AGNES_API_KEY" >> $GITHUB_OUTPUT
            echo "stt_base_url=$AGNES_BASE_URL" >> $GITHUB_OUTPUT
            echo "stt_model=$FOUND_MODEL" >> $GITHUB_OUTPUT
          else
            echo "::notice::Agnes gateway does NOT have a working Whisper model (tried: $MODELS_TO_TRY). Voice input will be disabled in the APK. Set VITE_STT_API_KEY + VITE_STT_BASE_URL secrets to enable (OpenAI / Groq / DeepInfra)."
            echo "use_agnes=false" >> $GITHUB_OUTPUT
          fi

      # ---------- 5c. Build the web bundle (Vite) ----------
      # Injects AGNES_* and (probed or user-set) STT_* credentials so
      # they're baked into the JS bundle at build time.
      - name: 🏗️ Build web bundle (Vite)
        env:
          # Translation engine — required.
          VITE_AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          VITE_AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          VITE_AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
          # Voice / STT — three tiers of priority:
          #   1. User-set VITE_STT_BACKEND_URL (backend proxy mode)
          #   2. User-set VITE_STT_API_KEY + VITE_STT_BASE_URL (direct mode)
          #   3. Auto-probed Agnes Whisper (if step 5b succeeded)
          # If none, mic button shows "未配置".
          VITE_STT_BACKEND_URL: ${{ secrets.VITE_STT_BACKEND_URL }}
          VITE_STT_API_KEY: ${{ secrets.VITE_STT_API_KEY || (steps.stt_probe.outputs.use_agnes == 'true' && steps.stt_probe.outputs.stt_api_key) }}
          VITE_STT_BASE_URL: ${{ secrets.VITE_STT_BASE_URL || (steps.stt_probe.outputs.use_agnes == 'true' && steps.stt_probe.outputs.stt_base_url) }}
          VITE_STT_MODEL: ${{ secrets.VITE_STT_MODEL || steps.stt_probe.outputs.stt_model }}
          # Supabase (optional — for history & quota; works without on APK).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ---------- 6. Sanity-check the freshly built bundle ----------
      # Fail early (before the slow Gradle build) if Agnes credentials
      # didn't make it into the bundle.
      - name: 🔍 Sanity-check web bundle
        run: |
          set -e
          echo "=== dist files ==="
          ls -la dist/assets/
          echo ""
          echo "=== Verify Agnes URL is baked in ==="
          grep -c 'apihub.agnes-ai.com' dist/assets/*.js \
            || (echo "::error::apihub.agnes-ai.com missing from bundle — AGNES_BASE_URL secret not set?" && exit 1)
          echo "=== Verify API key prefix is baked in ==="
          grep -c 'sk-' dist/assets/*.js \
            || (echo "::error::API key missing from bundle — AGNES_API_KEY secret not set?" && exit 1)
          echo "=== Verify model name is baked in ==="
          grep -c 'agnes-2.0-flash' dist/assets/*.js \
            || (echo "::error::model name missing from bundle — AGNES_MODEL secret not set?" && exit 1)
          echo ""
          echo "=== STT (voice input) check ==="
          echo "Agnes Whisper probe result: use_agnes=${{ steps.stt_probe.outputs.use_agnes }}"
          if grep -q 'audio/transcriptions' dist/assets/*.js; then
            echo "STT client code present in bundle ✅"
          else
            echo "::warning::STT client code not found in bundle — voice input will not work"
          fi
          # Check if an STT API key made it into the bundle (it would be
          # the same 'sk-' prefix as Agnes, so we can't grep for it
          # directly — but we can check if isSTTConfigured() will return
          # true by looking for the audio/transcriptions endpoint AND a
          # non-empty key pattern near it).
          if [ "${{ steps.stt_probe.outputs.use_agnes }}" = "true" ]; then
            echo "✅ Agnes Whisper support detected — voice input ENABLED in this APK"
          elif [ -n "${{ secrets.VITE_STT_API_KEY }}" ] || [ -n "${{ secrets.VITE_STT_BACKEND_URL }}" ]; then
            echo "✅ User-configured STT secrets detected — voice input ENABLED"
          else
            echo "::notice::Voice input DISABLED in this APK. To enable:"
            echo "  Option A: Set VITE_STT_API_KEY + VITE_STT_BASE_URL secrets (OpenAI / Groq / DeepInfra)"
            echo "  Option B: Deploy the backend and set VITE_STT_BACKEND_URL"
          fi
          echo ""
          echo "=== ALL BUNDLE CHECKS PASSED ==="

      # ---------- 7. Clean & sync to Android project ----------
      - name: 🧹 Clean Capacitor Android assets
        run: |
          rm -rf android/app/src/main/assets/public
          rm -rf android/app/build
          rm -rf android/build
          rm -rf android/.gradle
          npx cap clean android || true

      - name: 🔄 Capacitor sync
        run: npx cap sync android

      - name: ✅ Verify synced assets
        run: |
          echo "=== Synced assets ==="
          ls -la android/app/src/main/assets/public/assets/
          echo ""
          echo "=== Verify bundle in android assets is the new one ==="
          grep -c 'apihub.agnes-ai.com' android/app/src/main/assets/public/assets/*.js
          grep -c 'agnes-2.0-flash' android/app/src/main/assets/public/assets/*.js

      # ---------- 8. Decode signing keystore ----------
      # Reads ANDROID_KEYSTORE_BASE64 + ANDROID_KEYSTORE_PASSWORD +
      # ANDROID_KEY_ALIAS + ANDROID_KEY_PASSWORD. If any are missing,
      # we skip signing and produce an unsigned APK.
      - name: 🔑 Decode signing keystore
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KS_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ] || [ -z "$KS_PASS" ] || [ -z "$KS_ALIAS" ] || [ -z "$KS_KEY_PASS" ]; then
            echo "::notice::Signing secrets not fully configured — building unsigned APK."
            echo "signed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Decoding keystore from ANDROID_KEYSTORE_BASE64..."
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          # Sanity-check the keystore is readable with the provided password
          if ! keytool -list -keystore "$RUNNER_TEMP/release.keystore" -storepass "$KS_PASS" >/dev/null 2>&1; then
            echo "::error::Keystore password incorrect — aborting signed build."
            exit 1
          fi
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KS_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KS_KEY_PASS" >> $GITHUB_ENV
          echo "signed=true" >> $GITHUB_OUTPUT

      # ---------- 9. Gradle cache ----------
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ---------- 10. Build the release APK ----------
      - name: 📲 Assemble APK
        working-directory: android
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace

      # ---------- 11. Verify APK is signed (if we expected it to be) ----------
      - name: 🔏 Verify APK signature
        if: steps.keystore.outputs.signed == 'true'
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          case "$APK" in
            *-unsigned.apk) echo "::error::APK is still unsigned despite signing secrets being set!"; exit 1;;
          esac
          SDKMANAGER_BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APKSIGNER="$SDKMANAGER_BUILD_TOOLS/apksigner"
          echo "Using apksigner: $APKSIGNER"
          $APKSIGNER verify --verbose "$APK" 2>&1 | head -10
          unzip -l "$APK" | grep -E "META-INF/.*(RSA|SF|MF)" \
            || (echo "::error::APK has no signing files!" && exit 1)

      # ---------- 12. Verify APK contents before release ----------
      - name: 📦 Verify APK contents
        run: |
          set -e
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          mkdir -p /tmp/apk_verify
          unzip -o "$APK" -d /tmp/apk_verify > /dev/null
          echo "=== APK assets ==="
          ls /tmp/apk_verify/assets/public/assets/
          echo ""
          echo "=== Verify APK bundle has the translation endpoint ==="
          grep -c 'apihub.agnes-ai.com' /tmp/apk_verify/assets/public/assets/*.js \
            || (echo "::error::APK missing translation endpoint!" && exit 1)
          echo "=== Verify APK bundle has the model name ==="
          grep -c 'agnes-2.0-flash' /tmp/apk_verify/assets/public/assets/*.js \
            || (echo "::error::APK missing model name!" && exit 1)
          echo "=== Verify app name & package ==="
          (cd /tmp/apk_verify && "$ANDROID_HOME/build-tools/34.0.0/aapt" dump badging "$OLDPWD/$APK" 2>/dev/null | grep -E "application-label|package")
          echo "=== ALL APK CHECKS PASSED ==="

      # ---------- 13. Resolve the tag name for this release ----------
      # Tag format is always v<version> (e.g. v1.0.2) — no short-SHA suffix —
      # so GitHub Releases sorts by semantic version and the latest build
      # appears at the top. Pre-release flag comes from step 1b.
      - name: 🏷️ Compute release tag
        id: tag
        run: |
          echo "name=${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "version=${{ steps.version.outputs.name }}" >> $GITHUB_OUTPUT
          echo "prerelease=${{ steps.version.outputs.prerelease }}" >> $GITHUB_OUTPUT

      # ---------- 14. Stage APK with a clean filename ----------
      - name: 📝 Stage APK artifact
        run: |
          mkdir -p staging
          SRC=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$SRC" ]; then
            echo "::error::No APK found"; exit 1
          fi
          DST="staging/linguaverse-${{ steps.tag.outputs.version }}.apk"
          cp "$SRC" "$DST"
          echo "APK_PATH=$DST" >> $GITHUB_ENV
          ls -la staging/

      # ---------- 15. Upload APK as a workflow artifact ----------
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinguaVerse-${{ steps.tag.outputs.name }}
          path: staging/*.apk
          if-no-files-found: error
          retention-days: 30

      # ---------- 16. Publish to GitHub Releases ----------
      # softprops/action-gh-release creates the tag if it doesn't exist,
      # or updates the release if the tag already exists. Setting
      # `make_latest: true` tells GitHub to mark this as the "latest"
      # release (the one shown on the repo homepage) — so the newest
      # build is always pinned to the top of the Releases page.
      - name: 🚀 Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: 译境 LinguaVerse ${{ steps.tag.outputs.version }}
          files: staging/*.apk
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## 译境 LinguaVerse ${{ steps.tag.outputs.version }}

            **Build source:** `${{ github.ref_name }}` @ ${{ github.sha }}
            **versionCode:** ${{ steps.version.outputs.code }}

            ### What's inside
            - Android APK (Capacitor 6 + Vite + React 18)
            - Translation: direct Agnes `agnes-2.0-flash` call (key baked in)
            - Voice input: MediaRecorder → Agnes Whisper `/audio/transcriptions` → textarea
            - Industrial-minimalist UI

            ### Installation
            1. Download the `.apk` below.
            2. On Android, allow "Install unknown apps" for your browser.
            3. Tap to install.

            > ⚠️ This is an automated build. Verify the publisher before installing on production devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
