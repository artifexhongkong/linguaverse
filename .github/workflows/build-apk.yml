name: Build & Release Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version label (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write   # required to create GitHub Releases & upload APK assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        env:
          # Vite embeds these into the JS bundle so the APK can call Agnes directly.
          VITE_AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          VITE_AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          VITE_AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
        run: npm run build

      - name: Sync to Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=LinguaVerse-$(date +%Y%m%d)-${GITHUB_SHA::7}.apk" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Compute version tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            V="${{ github.event.inputs.version_name }}"
            [ -z "$V" ] && V="1.0.0"
            echo "name=v${V}-$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: LinguaVerse ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          prerelease: false
