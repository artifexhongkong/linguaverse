name: Build & Release Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version label (e.g. 1.0.1)'
        required: false
        default: '1.0.1'

permissions:
  contents: write   # required to create GitHub Releases & upload APK assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        env:
          # Vite embeds these into the JS bundle so the APK can call Agnes directly.
          VITE_AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          VITE_AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          VITE_AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
        run: npm run build

      - name: Sanity-check the freshly built bundle
        run: |
          echo "=== dist files ==="
          ls -la dist/assets/
          echo ""
          echo "=== Verify Agnes URL is baked in ==="
          grep -c 'apihub.agnes-ai.com' dist/assets/*.js || (echo "ERROR: apihub.agnes-ai.com missing from bundle!" && exit 1)
          echo "=== Verify API key prefix is baked in ==="
          grep -c 'sk-' dist/assets/*.js || (echo "ERROR: API key missing from bundle!" && exit 1)
          echo "=== Verify model name is baked in ==="
          grep -c 'agnes-2.0-flash' dist/assets/*.js || (echo "ERROR: model name missing from bundle!" && exit 1)
          echo "=== Bundle does NOT reference Supabase Edge Function path ==="
          if grep -q 'functions/v1/agnes-translate' dist/assets/*.js; then
            echo "WARNING: bundle still references Supabase Edge Function path (OK if VITE_SUPABASE_URL not set)"
          else
            echo "OK: no Supabase Edge Function path"
          fi

      - name: Upload dist as artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

      - name: Clean Capacitor Android assets before sync
        run: |
          rm -rf android/app/src/main/assets/public
          rm -rf android/app/build
          rm -rf android/build
          rm -rf android/.gradle
          npx cap clean android || true

      - name: Sync to Android
        run: npx cap sync android

      - name: Verify synced assets
        run: |
          echo "=== Synced assets ==="
          ls -la android/app/src/main/assets/public/assets/
          echo ""
          echo "=== Verify bundle in android assets is the new one ==="
          grep -c 'apihub.agnes-ai.com' android/app/src/main/assets/public/assets/*.js
          grep -c 'agnes-2.0-flash' android/app/src/main/assets/public/assets/*.js
          if grep -q 'LLaMA-3.1' android/app/src/main/assets/public/assets/*.js; then
            echo "ERROR: synced bundle still contains LLaMA-3.1 (old code!)"
            exit 1
          fi
          echo "OK: synced bundle is the new Agnes version"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p /tmp/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore/linguaverse.keystore
          ls -la /tmp/keystore/linguaverse.keystore
          # Verify it's a valid keystore
          keytool -list -keystore /tmp/keystore/linguaverse.keystore -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" 2>&1 | head -5

      - name: Build signed release APK
        working-directory: android
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          AGNES_BASE_URL: ${{ secrets.AGNES_BASE_URL }}
          AGNES_MODEL: ${{ secrets.AGNES_MODEL }}
          KEYSTORE_PATH: /tmp/keystore/linguaverse.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: Verify APK is signed
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          # Should NOT be named *-unsigned.apk
          case "$APK" in
            *-unsigned.apk) echo "ERROR: APK is still unsigned!"; exit 1;;
          esac
          # Verify with apksigner
          SDKMANAGER_BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APKSIGNER="$SDKMANAGER_BUILD_TOOLS/apksigner"
          echo "Using apksigner: $APKSIGNER"
          $APKSIGNER verify --verbose "$APK" 2>&1 | head -10
          # List signing files in APK
          unzip -l "$APK" | grep -E "META-INF/.*(RSA|SF|MF)" || (echo "ERROR: APK has no signing files!" && exit 1)

      - name: Verify APK contents before release
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          mkdir -p /tmp/apk_verify
          unzip -o "$APK" -d /tmp/apk_verify > /dev/null
          echo "=== APK assets ==="
          ls /tmp/apk_verify/assets/public/assets/
          echo ""
          echo "=== Verify APK bundle has Agnes URL ==="
          grep -c 'apihub.agnes-ai.com' /tmp/apk_verify/assets/public/assets/*.js || (echo "ERROR: APK missing Agnes URL!" && exit 1)
          echo "=== Verify APK bundle has model name ==="
          grep -c 'agnes-2.0-flash' /tmp/apk_verify/assets/public/assets/*.js || (echo "ERROR: APK missing model name!" && exit 1)
          echo "=== Verify APK does NOT have LLaMA-3.1 ==="
          if grep -q 'LLaMA-3.1' /tmp/apk_verify/assets/public/assets/*.js; then
            echo "ERROR: APK still has LLaMA-3.1 — old bundle got packaged!"
            exit 1
          fi
          echo "=== Verify app name ==="
          grep -ao '译境 LinguaVerse' /tmp/apk_verify/resources.arsc 2>/dev/null | head -1 || \
            (cd /tmp/apk_verify && aapt dump badging "$OLDPWD/$APK" 2>/dev/null | grep -E "application:|label:")
          echo "ALL CHECKS PASSED"

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=linguaverse-$(date +%Y%m%d)-${GITHUB_SHA::7}.apk" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Compute version tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            V="${{ github.event.inputs.version_name }}"
            [ -z "$V" ] && V="1.0.1"
            echo "name=v${V}-$(date +%Y%m%d%H%M)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: 译境 LinguaVerse ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          prerelease: false
          body: |
            ## 译境 LinguaVerse — AI 語境翻譯

            Built from commit `${{ github.sha }}`.

            **Translation engine**: Agnes AI `agnes-2.0-flash` model
            - Base URL: `https://apihub.agnes-ai.com/v1`
            - APK calls Agnes directly (no Supabase Edge Function dependency)

            **APK is signed** with the project's release keystore (SHA256 signing cert: see workflow logs).

            ### Verification
            The workflow runs sanity checks to confirm the APK bundle contains:
            - `apihub.agnes-ai.com` (correct Agnes API endpoint)
            - `agnes-2.0-flash` (correct model ID)
            - The API key
            - **Not** the old `LLaMA-3.1` model reference
            - **Is signed** (apksigner verify passes)

            If you see this release, all those checks passed.
