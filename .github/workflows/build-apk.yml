name: Build & Release APK

# ============================================================
# LinguaVerse — Android APK build & release pipeline
# ------------------------------------------------------------
# Triggers:
#   • push to main     → builds a debug-signed APK and publishes
#                        it as a "Pre-release" tagged with the
#                        short commit SHA.
#   • workflow_dispatch → manual run; prompts for a tag name and
#                          whether it should be marked as latest.
#   • tag v*            → builds a release-signed APK (if signing
#                          secrets are present) and publishes it
#                          as a stable Release tied to that tag.
#
# Signing:
#   If the ANDROID_KEYSTORE_BASE64 / KEYSTORE_PASSWORD /
#   KEY_ALIAS / KEY_PASSWORD secrets are set, the APK is signed
#   with that keystore. Otherwise, the APK is built unsigned
#   (debug-signed fallback) and uploaded anyway — useful for
#   internal testing before a real release key exists.
# ============================================================

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'
      is_prerelease:
        description: 'Mark as pre-release?'
        type: boolean
        required: false
        default: true

permissions:
  contents: write   # required for softprops/action-gh-release to create Releases

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ---------- 1. Checkout ----------
      - name: 📥 Checkout source
        uses: actions/checkout@v4

      # ---------- 2. Node + npm cache ----------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci || npm install

      # ---------- 3. Build the web bundle (Vite) ----------
      - name: 🏗️ Build web bundle (Vite)
        run: npm run build
        env:
          # Optional — if VITE_STT_BACKEND_URL is configured as a
          # repo secret, the APK will ship with the production STT
          # endpoint baked in. Leave empty to use direct mode.
          VITE_STT_BACKEND_URL: ${{ secrets.VITE_STT_BACKEND_URL }}
          VITE_STT_API_KEY: ${{ secrets.VITE_STT_API_KEY }}
          VITE_STT_BASE_URL: ${{ secrets.VITE_STT_BASE_URL }}
          VITE_STT_MODEL: ${{ secrets.VITE_STT_MODEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ---------- 4. Sync web bundle into the Android project ----------
      - name: 🔄 Capacitor sync
        run: npx cap sync android

      # ---------- 5. Decode signing keystore (if provided) ----------
      - name: 🔑 Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "Decoding keystore from ANDROID_KEYSTORE_BASE64..."
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # ---------- 6. Setup JDK ----------
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- 7. Gradle cache ----------
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ---------- 8. Build the release APK ----------
      - name: 📲 Assemble APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ---------- 9. Resolve the tag name for this release ----------
      - name: 🏷️ Compute release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.is_prerelease }}" >> $GITHUB_OUTPUT
          else
            # push to main → nightly-style tag
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "name=nightly-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      # ---------- 10. Stage APK with a clean filename ----------
      - name: 📝 Stage APK artifact
        run: |
          mkdir -p staging
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          [ -f "$SRC" ] || SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          [ -f "$SRC" ] || SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$SRC" ]; then
            echo "No APK found at any expected path"; exit 1
          fi
          DST="staging/LinguaVerse-${{ steps.tag.outputs.name }}.apk"
          cp "$SRC" "$DST"
          echo "APK_PATH=$DST" >> $GITHUB_ENV
          ls -la staging/

      # ---------- 11. Upload APK as a workflow artifact ----------
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinguaVerse-${{ steps.tag.outputs.name }}
          path: staging/*.apk
          if-no-files-found: error
          retention-days: 30

      # ---------- 12. Publish to GitHub Releases ----------
      - name: 🚀 Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: LinguaVerse ${{ steps.tag.outputs.name }}
          files: staging/*.apk
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## LinguaVerse ${{ steps.tag.outputs.name }}

            **Build source:** `${{ github.ref_name }}` @ ${{ github.sha }}

            ### What's inside
            - Android APK (Capacitor 6 + Vite + React 18)
            - Voice input (MediaRecorder → `/api/v1/stt` → textarea)
            - Industrial-minimalist UI

            ### Installation
            1. Download the `.apk` below.
            2. On Android, allow "Install unknown apps" for your browser.
            3. Tap to install.

            > ⚠️ This is an automated build. Verify the publisher before installing on production devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
