# Heap increased from 512m to 4g — needed to compress the 234MB sherpa-onnx
# model file during compressReleaseAssets. Without this, Gradle throws
# "Java heap space" when processing the large .onnx asset.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -XX:+UseSerialGC
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false
org.gradle.workers.max=1
android.useAndroidX=true
